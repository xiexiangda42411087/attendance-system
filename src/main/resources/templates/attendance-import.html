<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量导入 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 700px;">
    <!-- 提示消息 -->
    <div th:if="${message}"
         class="alert alert-dismissible fade show" role="alert"
         th:classappend="${#strings.contains(message, '失败') ? 'alert-danger' : 'alert-success'}">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-file-earmark-excel"></i> 批量导入考勤记录</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/attendance/import}" method="post"
                  enctype="multipart/form-data" id="importForm">

                <div class="mb-3">
                    <label class="form-label">选择Excel文件</label>
                    <input type="file" class="form-control" name="file" id="fileInput"
                           accept=".xlsx,.xls" required />
                    <div class="form-text">
                        <i class="bi bi-info-circle"></i>
                        支持 .xlsx 和 .xls 格式，文件大小不超过10MB
                    </div>
                </div>

                <!-- 文件信息预览 -->
                <div id="fileInfo" class="alert alert-secondary" style="display: none;">
                    <strong id="fileName"></strong>
                    <span id="fileSize" class="ms-2 text-muted"></span>
                </div>

                <!-- 上传进度条 -->
                <div id="progressBar" class="progress mb-3" style="display: none; height: 20px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated"
                         role="progressbar" style="width: 0%"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="bi bi-upload"></i> 上传并导入
                    </button>
                    <a th:href="@{/attendance/list}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 返回
                    </a>
                </div>
            </form>

            <!-- 模板下载 -->
            <hr>
            <div class="mt-3">
                <h5>📥 下载模板</h5>
                <p class="text-muted small">请使用以下模板格式准备数据：</p>
                <table class="table table-sm table-bordered small">
                    <thead class="table-light">
                    <tr>
                        <th>学号*</th>
                        <th>课程编号*</th>
                        <th>打卡时间</th>
                        <th>状态</th>
                        <th>备注</th>
                        <th>座位行</th>
                        <th>座位列</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>20230001</td>
                        <td>CS101</td>
                        <td>2024-01-15 08:00:00</td>
                        <td>NORMAL</td>
                        <td></td>
                        <td>3</td>
                        <td>5</td>
                    </tr>
                    <tr>
                        <td>20230002</td>
                        <td>CS101</td>
                        <td>2024-01-15 08:15:00</td>
                        <td>LATE</td>
                        <td>交通拥堵</td>
                        <td>5</td>
                        <td>2</td>
                    </tr>
                    </tbody>
                </table>
                <p class="small text-muted">
                    * 必填项 | 状态可选: NORMAL/LATE/EARLY/ABSENT | 日期格式: yyyy-MM-dd HH:mm:ss
                </p>
            </div>
        </div>
    </div>

    <!-- 导入错误详情 -->
    <div th:if="${errorDetails}" class="card shadow mt-3">
        <div class="card-header bg-warning">
            <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 导入失败详情</h5>
        </div>
        <div class="card-body">
            <ul class="list-group list-group-flush small">
                <li class="list-group-item" th:each="detail : ${errorDetails}"
                    th:text="${detail}"></li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 文件选择时显示信息
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('fileName').textContent = '📄 ' + file.name;
            const size = (file.size / 1024).toFixed(1);
            document.getElementById('fileSize').textContent = size > 1024
                ? (size / 1024).toFixed(1) + ' MB' : size + ' KB';
        }
    });

    // 提交时显示进度条
    document.getElementById('importForm').addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 导入中...';
        document.getElementById('progressBar').style.display = 'block';
    });
</script>
</body>
</html>
