<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 考勤管理系统'">学生表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> 考勤管理系统
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/student/list}">
                <i class="bi bi-people-fill"></i> 学生管理
            </a>
            <a class="nav-link" th:href="@{/home}">
                <i class="bi bi-house-fill"></i> 首页
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 700px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${title}">学生表单</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/student/save}"
                  th:method="post"
                  th:object="${student}">

                <!-- 隐藏字段：是否是编辑模式 -->
                <input type="hidden" name="isEdit" th:value="${isEdit}" />

                <!-- 学号（编辑时只读） -->
                <div class="mb-3">
                    <label for="studentId" class="form-label">
                        <span class="text-danger">*</span> 学号
                    </label>
                    <input type="text"
                           id="studentId"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('studentId')} ? 'is-invalid' : ''"
                           th:field="*{studentId}"
                           th:readonly="${isEdit}"
                           placeholder="请输入学号"
                           required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentId')}"
                         th:errors="*{studentId}"></div>
                </div>

                <!-- 姓名 -->
                <div class="mb-3">
                    <label for="name" class="form-label">
                        <span class="text-danger">*</span> 姓名
                    </label>
                    <input type="text"
                           id="name"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           th:field="*{name}"
                           placeholder="请输入姓名"
                           required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <!-- 性别 -->
                <div class="mb-3">
                    <label class="form-label">性别</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio"
                                   th:field="*{gender}" value="男" id="genderMale">
                            <label class="form-check-label" for="genderMale">男</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio"
                                   th:field="*{gender}" value="女" id="genderFemale">
                            <label class="form-check-label" for="genderFemale">女</label>
                        </div>
                    </div>
                </div>

                <!-- 出生日期 -->
                <div class="mb-3">
                    <label for="birthDate" class="form-label">出生日期</label>
                    <input type="date"
                           id="birthDate"
                           class="form-control"
                           th:field="*{birthDate}">
                </div>

                <!-- 班级 -->
                <div class="mb-3">
                    <label for="className" class="form-label">班级</label>
                    <input type="text"
                           id="className"
                           class="form-control"
                           th:field="*{className}"
                           placeholder="请输入班级">
                </div>

                <!-- 手机号 -->
                <div class="mb-3">
                    <label for="phone" class="form-label">手机号</label>
                    <input type="tel"
                           id="phone"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                           th:field="*{phone}"
                           placeholder="请输入手机号（11位）"
                           pattern="^1[3-9]\d{9}$">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}"></div>
                    <div class="form-text">格式：1开头11位数字</div>
                </div>

                <!-- 邮箱 -->
                <div class="mb-4">
                    <label for="email" class="form-label">邮箱</label>
                    <input type="email"
                           id="email"
                           class="form-control"
                           th:field="*{email}"
                           placeholder="请输入邮箱">
                </div>

                <!-- 按钮组 -->
                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/student/list}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 返回列表
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
