<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤记录 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 引用导航栏组件 -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <!-- 提示消息 -->
    <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="bi bi-info-circle-fill"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-list-check"></i> 考勤记录</h2>
        <!-- 仅 USER 可见 -->
        <a th:href="@{/attendance/checkIn}" class="btn btn-primary" id="checkInBtn" style="display: none;">
            <i class="bi bi-check2-circle"></i> 考勤打卡
        </a>
    </div>

    <!-- 筛选条件 -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form th:action="@{/attendance/list}" method="get" class="row g-2 align-items-end">
                <!-- 快速筛选 -->
                <div class="col-md-2">
                    <label class="form-label">快速筛选</label>
                    <select name="quickFilter" class="form-select" onchange="this.form.submit()">
                        <option value="">全部</option>
                        <option value="today" th:selected="${quickFilter == 'today'}">今天</option>
                        <option value="week" th:selected="${quickFilter == 'week'}">本周</option>
                        <option value="month" th:selected="${quickFilter == 'month'}">本月</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">学号</label>
                    <input type="text" name="studentId" class="form-control"
                           th:value="${studentId}" placeholder="学号"
                           id="studentIdInput">
                </div>
                <div class="col-md-2">
                    <label class="form-label">姓名</label>
                    <input type="text" name="studentName" class="form-control"
                           th:value="${studentName}" placeholder="姓名">
                </div>
                <div class="col-md-2">
                    <label class="form-label">课程</label>
                    <select name="courseId" class="form-select">
                        <option value="">全部</option>
                        <option th:each="course : ${courses}"
                                th:value="${course.courseId}"
                                th:text="${course.courseId} + ' - ' + ${course.courseName}"
                                th:selected="${courseId == course.courseId}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">状态</label>
                    <select name="status" class="form-select">
                        <option value="">全部状态</option>
                        <option value="NORMAL" th:selected="${status == 'NORMAL'}">✅ 正常</option>
                        <option value="LATE" th:selected="${status == 'LATE'}">⚠️ 迟到</option>
                        <option value="EARLY" th:selected="${status == 'EARLY'}">🔴 早退</option>
                        <option value="ABSENT" th:selected="${status == 'ABSENT'}">❌ 缺勤</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 统计 -->
    <div class="mb-2 text-muted">
        共 <strong th:text="${totalElements}">0</strong> 条记录，第
        <strong th:text="${currentPage}">1</strong>/<strong th:text="${totalPages}">1</strong> 页
    </div>

    <!-- 数据表格 -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>日期</th>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>课程</th>
                    <th>打卡时间</th>
                    <th>状态</th>
                    <th>备注</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(records)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                        <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                        <p class="mt-2">暂无考勤记录</p>
                    </td>
                </tr>
                <tr th:each="record : ${records}">
                    <td th:text="${#temporals.format(record.checkInTime, 'yyyy-MM-dd')}"></td>
                    <td th:text="${record.student?.studentId}"></td>
                    <td th:text="${record.studentName}"></td>
                    <td th:text="${record.courseName ?: record.courseId}"></td>
                    <td th:text="${#temporals.format(record.checkInTime, 'HH:mm:ss')}"></td>
                    <td>
                                <span class="badge"
                                      th:classappend="${record.status == 'NORMAL'} ? 'bg-success' :
                                                       (${record.status == 'LATE'} ? 'bg-warning text-dark' :
                                                       (${record.status == 'EARLY'} ? 'bg-danger' : 'bg-secondary'))">
                                    <span th:switch="${record.status}">
                                        <span th:case="NORMAL">正常</span>
                                        <span th:case="LATE">迟到</span>
                                        <span th:case="EARLY">早退</span>
                                        <span th:case="ABSENT">缺勤</span>
                                        <span th:case="*" th:text="${record.status}"></span>
                                    </span>
                                </span>
                    </td>
                    <td th:text="${record.remark ?: '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页 -->
    <nav class="mt-3" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/attendance/list(
                        page=${currentPage - 1}, studentId=${studentId}, studentName=${studentName},
                        courseId=${courseId}, status=${status}, quickFilter=${quickFilter},
                        size=${size})}">上一页</a>
            </li>

            <th:block th:with="startPage=${currentPage - 2 < 1 ? 1 : (currentPage + 2 > totalPages ? (totalPages - 4 < 1 ? 1 : totalPages - 4) : currentPage - 2)},
                                   endPage=${startPage + 4 > totalPages ? totalPages : startPage + 4}">
                <li th:if="${startPage > 1}" class="page-item disabled"><span class="page-link">...</span></li>
                <li th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
                    <a class="page-link" th:href="@{/attendance/list(
                            page=${i}, studentId=${studentId}, studentName=${studentName},
                            courseId=${courseId}, status=${status}, quickFilter=${quickFilter},
                            size=${size})}" th:text="${i}">1</a>
                </li>
                <li th:if="${endPage < totalPages}" class="page-item disabled"><span class="page-link">...</span></li>
            </th:block>

            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/attendance/list(
                        page=${currentPage + 1}, studentId=${studentId}, studentName=${studentName},
                        courseId=${courseId}, status=${status}, quickFilter=${quickFilter},
                        size=${size})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const role = sessionStorage.getItem('role');
        const studentIdInput = document.getElementById('studentIdInput');

        // USER 角色：学号输入框只读，不可修改
        if (role === 'ROLE_USER' && studentIdInput) {
            studentIdInput.readOnly = true;
            studentIdInput.style.backgroundColor = '#e9ecef';
            studentIdInput.style.cursor = 'not-allowed';
        }

        // URL 参数自动填入
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('studentId');
        if (studentId && studentIdInput) {
            studentIdInput.value = studentId;
        }

        // USER 显示打卡按钮
        if (role === 'ROLE_USER') {
            const btn = document.getElementById('checkInBtn');
            if (btn) btn.style.display = 'inline-block';
        }
    });
</script>
</body>
</html>
