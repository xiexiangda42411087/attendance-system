<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 考勤管理系统'">用户注册 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>📝 创建账号</h1>
            <p>注册一个学生账号</p>
        </div>

        <div id="messageBox" class="alert" style="display: none;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名 <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username"
                           placeholder="4-20位字母或数字" minlength="4" maxlength="20"
                           pattern="[a-zA-Z0-9]+" required>
                </div>
                <span class="error-hint" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="studentId">学号 <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">🎓</span>
                    <input type="text" id="studentId" name="studentId"
                           placeholder="请输入学号" required>
                </div>
                <span class="error-hint" id="studentIdError"></span>
            </div>

            <div class="form-group">
                <label for="realName">真实姓名 <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">📛</span>
                    <input type="text" id="realName" name="realName"
                           placeholder="请输入真实姓名" required>
                </div>
                <span class="error-hint" id="realNameError"></span>
            </div>

            <div class="form-group">
                <label for="password">密码 <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password"
                           placeholder="至少6位密码" minlength="6" required>
                    <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                </div>
                <span class="error-hint" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码 <span class="text-danger">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="请再次输入密码" required>
                    <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>
                <span class="error-hint" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                注 册
            </button>
        </form>

        <div class="card-footer">
            <span>已有账号？</span>
            <a th:href="@{/login-page}">立即登录</a>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js?v=2}"></script>
</body>
</html>
