<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤统计 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 800px;">
    <h2><i class="bi bi-graph-up"></i> 考勤统计</h2>

    <!-- 查询表单 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/attendance/statistics}" method="get" class="row g-2 mb-4" id="statsForm">
                <div class="col-md-4">
                    <label class="form-label">学号</label>
                    <input type="text" name="studentId" class="form-control"
                           th:value="${studentId}" placeholder="输入学号">
                </div>
                <div class="col-md-4">
                    <label class="form-label">课程</label>
                    <select name="courseId" class="form-select" onchange="submitWithStudentId()">
                        <option value="">全部</option>
                        <option th:each="course : ${courses}"
                                th:value="${course.courseId}"
                                th:text="${course.courseId} + ' - ' + ${course.courseName}"
                                th:selected="${courseId == course.courseId}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 学生统计结果 -->
    <div th:if="${stats}" class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">📊 学生考勤统计</h5>
        </div>
        <div class="card-body">
            <div class="row text-center">
                <div class="col-3">
                    <div class="display-6 text-primary" th:text="${stats.totalCount}">0</div>
                    <small>总次数</small>
                </div>
                <div class="col-3">
                    <div class="display-6 text-success" th:text="${stats.normalCount}">0</div>
                    <small>正常</small>
                </div>
                <div class="col-3">
                    <div class="display-6 text-warning" th:text="${stats.lateCount}">0</div>
                    <small>迟到</small>
                </div>
                <div class="col-3">
                    <div class="display-6 text-danger" th:text="${stats.absentCount}">0</div>
                    <small>缺勤</small>
                </div>
            </div>
            <hr>
            <div class="text-center">
                <h4>
                    出勤率：
                    <span class="badge bg-success fs-4"
                          th:text="${#numbers.formatDecimal(stats.attendanceRate, 1, 1) + '%'}">0%</span>
                </h4>
            </div>
            <!-- 简易进度条 -->
            <div class="progress mt-3" style="height: 25px;">
                <div class="progress-bar bg-success"
                     th:style="'width:' + ${stats.attendanceRate} + '%'"
                     th:text="${#numbers.formatDecimal(stats.attendanceRate, 1, 1) + '%'}"></div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function submitWithStudentId() {
        // 保留学号输入框的值，切换课程时一起提交
        document.getElementById('statsForm').submit();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const role = sessionStorage.getItem('role');
        // USER 角色隐藏课程整体统计
        if (role === 'ROLE_USER') {
            const courseStats = document.getElementById('courseStatsSection');
            if (courseStats) courseStats.style.display = 'none';
        }
    });
</script>
</body>
</html>
