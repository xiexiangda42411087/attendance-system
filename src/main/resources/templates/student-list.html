<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生列表 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> 考勤管理系统
        </a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3" id="welcomeMsg"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- 提示消息 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 页面标题和操作栏 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-people-fill"></i> 学生管理</h2>
        <div class="d-flex gap-2">
            <button id="batchDeleteBtn" class="btn btn-danger" style="display: none;"
                    onclick="batchDelete()">
                <i class="bi bi-trash-fill"></i> 批量删除
            </button>
            <a th:href="@{/student/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> 添加学生
            </a>
        </div>
    </div>

    <!-- 搜索栏 -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <form th:action="@{/student/list}" method="get" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">搜索</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" class="form-control"
                               th:value="${keyword}" placeholder="学号/姓名/班级">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">排序字段</label>
                    <select name="sortField" class="form-select">
                        <option value="studentId" th:selected="${sortField == 'studentId'}">学号</option>
                        <option value="name" th:selected="${sortField == 'name'}">姓名</option>
                        <option value="className" th:selected="${sortField == 'className'}">班级</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">排序方式</label>
                    <select name="sortDir" class="form-select">
                        <option value="asc" th:selected="${sortDir == 'asc'}">升序</option>
                        <option value="desc" th:selected="${sortDir == 'desc'}">降序</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">每页条数</label>
                    <select name="size" class="form-select">
                        <option value="5" th:selected="${pageSize == 5}">5条</option>
                        <option value="10" th:selected="${pageSize == 10}">10条</option>
                        <option value="20" th:selected="${pageSize == 20}">20条</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 统计信息 -->
    <div class="mb-2 text-muted">
        共 <strong th:text="${totalElements}">0</strong> 条记录，第
        <strong th:text="${currentPage}">1</strong>/<strong th:text="${totalPages}">1</strong> 页
    </div>

    <!-- 学生表格 -->
    <form id="batchForm" th:action="@{/student/batch-delete}" method="post">
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="table-col-checkbox">
                            <input type="checkbox" id="selectAll" class="form-check-input"
                                   onchange="toggleSelectAll(this)">
                        </th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>班级</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th class="table-col-action">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="8" class="text-center py-4 text-muted">
                            <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                            <p class="mt-2">暂无学生数据</p>
                        </td>
                    </tr>
                    <tr th:each="student : ${students}">
                        <td class="table-col-checkbox">
                            <input type="checkbox" name="ids" class="form-check-input student-checkbox"
                                   th:value="${student.studentId}" onchange="toggleBatchBtn()">
                        </td>
                        <td th:text="${student.studentId}"></td>
                        <td th:text="${student.name}"></td>
                        <td>
                            <span th:if="${student.gender == '男'}" class="badge bg-info">男</span>
                            <span th:if="${student.gender == '女'}" class="badge bg-danger">女</span>
                            <span th:unless="${student.gender}" class="text-muted">-</span>
                        </td>
                        <td th:text="${student.className} ?: '-'"></td>
                        <td th:text="${student.phone} ?: '-'"></td>
                        <td th:text="${student.email} ?: '-'"></td>
                        <td class="table-col-action">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/student/edit/{id}(id=${student.studentId})}">
                                <i class="bi bi-pencil-square"></i> 编辑
                            </a>
                            <a class="btn btn-sm btn-outline-danger"
                               th:href="@{/student/delete/{id}(id=${student.studentId})}"
                               onclick="return confirm('确定要删除学生【' + this.getAttribute('data-name') + '】吗？')"
                               th:attr="data-name=${student.name}">
                                <i class="bi bi-trash"></i> 删除
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </form>

    <!-- 分页导航 -->
    <nav class="mt-3" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <!-- 上一页 -->
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/student/list(page=${currentPage - 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir}, size=${pageSize})}">
                    上一页
                </a>
            </li>

            <!-- 页码（最多显示5个） -->
            <th:block th:with="startPage=${#numbers.sequence(1, totalPages).size() > 5 ? (currentPage - 2 < 1 ? 1 : (currentPage + 2 > totalPages ? totalPages - 4 : currentPage - 2)) : 1},
                                   endPage=${startPage + 4 > totalPages ? totalPages : startPage + 4}">
                <li th:if="${startPage > 1}" class="page-item disabled"><span class="page-link">...</span></li>
                <li th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    class="page-item" th:classappend="${i == currentPage} ? 'active' : ''">
                    <a class="page-link"
                       th:href="@{/student/list(page=${i}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir}, size=${pageSize})}"
                       th:text="${i}">1</a>
                </li>
                <li th:if="${endPage < totalPages}" class="page-item disabled"><span class="page-link">...</span></li>
            </th:block>

            <!-- 下一页 -->
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/student/list(page=${currentPage + 1}, keyword=${keyword}, sortField=${sortField}, sortDir=${sortDir}, size=${pageSize})}">
                    下一页
                </a>
            </li>
        </ul>
    </nav>

    <!-- 快捷跳转 -->
    <div class="text-center mt-2" th:if="${totalPages > 10}">
        <form th:action="@{/student/list}" method="get" class="d-inline-flex gap-2 align-items-center">
            <input type="hidden" name="keyword" th:value="${keyword}">
            <input type="hidden" name="sortField" th:value="${sortField}">
            <input type="hidden" name="sortDir" th:value="${sortDir}">
            <input type="hidden" name="size" th:value="${pageSize}">
            <span>跳转到第</span>
            <input type="number" name="page" class="form-control form-control-sm"
                   style="width: 70px;" min="1" th:max="${totalPages}" required>
            <span>页</span>
            <button type="submit" class="btn btn-sm btn-outline-primary">GO</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
    // 全选/反选
    function toggleSelectAll(source) {
        document.querySelectorAll('.student-checkbox').forEach(cb => {
            cb.checked = source.checked;
        });
        toggleBatchBtn();
    }

    // 显示/隐藏批量删除按钮
    function toggleBatchBtn() {
        const checked = document.querySelectorAll('.student-checkbox:checked').length;
        document.getElementById('batchDeleteBtn').style.display = checked > 0 ? 'inline-block' : 'none';
    }

    // 批量删除
    function batchDelete() {
        const checked = document.querySelectorAll('.student-checkbox:checked');
        if (checked.length === 0) return;
        if (!confirm('确定要删除选中的 ' + checked.length + ' 名学生吗？此操作不可恢复！')) return;
        document.getElementById('batchForm').submit();
    }

    // 退出登录
    function logout() {
        fetch('/logout', { method: 'POST' })
            .then(() => { sessionStorage.clear(); window.location.href = '/login-page'; })
            .catch(() => { sessionStorage.clear(); window.location.href = '/login-page'; });
    }

    // 显示当前用户名
    document.addEventListener('DOMContentLoaded', function() {
        const username = sessionStorage.getItem('username');
        const welcomeMsg = document.getElementById('welcomeMsg');
        if (welcomeMsg && username) {
            welcomeMsg.textContent = '👋 ' + username;
        }
    });
</script>
</body>
</html>
