<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤打卡 - 考勤管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- 引用导航栏组件 -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 600px;">
    <!-- 提示消息 -->
    <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="bi bi-info-circle-fill"></i>
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-check2-circle"></i> 考勤打卡</h4>
        </div>
        <div class="card-body">
            <!-- 当前时间显示 -->
            <div class="text-center mb-4">
                <div class="display-6 text-primary" id="currentTime">--:--:--</div>
                <small class="text-muted" id="currentDate"></small>
            </div>

            <form th:action="@{/attendance/checkIn}" method="post" id="checkInForm">
                <div class="mb-3">
                    <label for="courseId" class="form-label">
                        <span class="text-danger">*</span> 选择课程
                    </label>
                    <select class="form-select" id="courseId" name="courseId" required onchange="updateRule()">
                        <option value="">请选择课程</option>
                        <option th:each="course : ${courses}"
                                th:value="${course.courseId}"
                                th:data-start="${course.startTime}"
                                th:data-end="${course.endTime}"
                                th:text="${course.courseId} + ' - ' + ${course.courseName}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">打卡时间</label>
                    <input type="text" class="form-control bg-light"
                           th:value="${#temporals.format(currentTime, 'yyyy-MM-dd HH:mm:ss')}"
                           readonly>
                </div>

                <div class="mb-4">
                    <label for="remark" class="form-label">备注</label>
                    <textarea class="form-control" id="remark" name="remark"
                              rows="3" placeholder="选填：请假原因或其他说明"></textarea>
                </div>

                <!-- 打卡规则提示 -->
                <div class="alert alert-warning small mb-4" id="checkRule">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <strong>打卡规则：</strong>
                    <ul class="mb-0 mt-1" id="ruleContent">
                        <li>请先选择课程</li>
                    </ul>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                    <i class="bi bi-check2-circle"></i> 立即打卡
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 实时更新时间
    function updateTime() {
        const now = new Date();
        document.getElementById('currentTime').textContent = 
            now.toTimeString().substring(0, 8);
        document.getElementById('currentDate').textContent = 
            now.getFullYear() + '-' + 
            String(now.getMonth() + 1).padStart(2, '0') + '-' + 
            String(now.getDate()).padStart(2, '0') + ' ' +
            ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][now.getDay()];
    }
    updateTime();
    setInterval(updateTime, 1000);

    // 提交时禁用按钮防重复
    document.getElementById('checkInForm').addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 提交中...';
    });

    function updateRule() {
        const select = document.getElementById('courseId');
        const selectedOption = select.options[select.selectedIndex];
        const startTime = selectedOption.getAttribute('data-start');
        const endTime = selectedOption.getAttribute('data-end');
        const ruleContent = document.getElementById('ruleContent');

        if (!startTime || !endTime) {
            ruleContent.innerHTML = '<li>请先选择课程</li>';
            return;
        }

        const start = startTime.substring(0, 5);
        const end = endTime.substring(0, 5);

        ruleContent.innerHTML =
            '<li>上课时间：' + start + ' - ' + end + '</li>' +
            '<li>打卡时间：' + start + ' - ' + end + '</li>' +
            '<li>' + start + ' 后打卡记为<strong>迟到</strong></li>' +
            '<li>下课后不能再打卡</li>';
    }
</script>
</body>
</html>
