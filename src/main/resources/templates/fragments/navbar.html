<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="en">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <i class="bi bi-mortarboard-fill"></i> 考勤系统
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <!-- 所有人可见 -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        <i class="bi bi-house-fill"></i> 首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/attendance/list}">
                        <i class="bi bi-list-check"></i> 考勤记录
                    </a>
                </li>

                <!-- USER：考勤打卡 -->
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/attendance/checkIn}">
                        <i class="bi bi-check2-circle"></i> 考勤打卡
                    </a>
                </li>

                <!-- ADMIN + TEACHER：批量导入、统计 -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'TEACHER')">
                    <a class="nav-link" th:href="@{/attendance/import}">
                        <i class="bi bi-file-earmark-excel"></i> 批量导入
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'TEACHER')">
                    <a class="nav-link" th:href="@{/attendance/statistics}">
                        <i class="bi bi-graph-up"></i> 统计
                    </a>
                </li>

                <!-- 仅 ADMIN：学生管理、课程管理 -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/student/list}">
                        <i class="bi bi-people-fill"></i> 学生管理
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/course/list}">
                        <i class="bi bi-book"></i> 课程管理
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<script>
    function logout() {
        fetch('/logout', { method: 'POST' })
            .then(() => { sessionStorage.clear(); window.location.href = '/login-page'; })
            .catch(() => { sessionStorage.clear(); window.location.href = '/login-page'; });
    }
</script>
</body>
</html>
